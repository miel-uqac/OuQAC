<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OùQAC">
    
    <title>OùQAC</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="map"></div>

        <div id="ui-layer">
            <div id="bottom-controls">
                <div class="floating-buttons">
                    <button class="btn-icon btn-camera" title="Scanner / AR">
                        <i class="fa-solid fa-camera"></i>
                    </button>
                    
                    <div class="layer-menu-container">
                        <div id="floor-menu" class="hidden">
                            <button class="floor-btn" data-floor="8">8</button>
                            <button class="floor-btn" data-floor="7">7</button>
                            <button class="floor-btn" data-floor="6">6</button>
                            <button class="floor-btn" data-floor="5">5</button>
                            <button class="floor-btn" data-floor="4">4</button>
                            <button class="floor-btn" data-floor="3">3</button>
                            <button class="floor-btn" data-floor="2">2</button>
                            <button class="floor-btn" data-floor="1">1</button>
                            <button class="floor-btn active" data-floor="0">RC</button>
                        </div>

                        <button class="btn-icon btn-layers" id="btn-toggle-floors" title="Changer d'étage">
                            <i class="fa-solid fa-layer-group"></i>
                        </button>
                    </div>
                </div>

                <div class="search-bar-container" id="main-search-trigger">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" placeholder="Search" readonly style="cursor: pointer;">
                    <button class="btn-mic" title="Recherche vocale">
                        <i class="fa-solid fa-microphone"></i>
                    </button>
                </div>

                <div class="search-bar-container hidden" id="minimized-route-trigger">
                    <i class="fa-solid fa-route search-icon text-primary"></i>
                    <input type="text" id="mini-route-text" class="text-primary" readonly style="cursor: pointer; font-weight: bold;">
                    <button class="btn-mic" id="btn-cancel-route-mini" title="Annuler l'itinéraire">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            </div>

            <div id="search-overlay" class="hidden">
                <div class="drag-handle"></div>
                
                <div class="search-overlay-header">
                    <div class="search-bar-container active-search">
                        <i class="fa-solid fa-magnifying-glass search-icon"></i>
                        <input type="text" id="active-search-input" placeholder="Search">
                        <button class="btn-mic" title="Recherche vocale">
                            <i class="fa-solid fa-microphone"></i>
                        </button>
                    </div>
                    <button id="btn-close-search" class="btn-close-overlay">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <div class="search-content">
                    <div id="common-places">
                        <h3 class="search-section-title">Lieux courants</h3>
                        <div class="location-list">
                            <div class="location-item">Cafétéria</div>
                            <div class="location-item">Bibliothèque</div>
                            <div class="location-item">Le Cube</div>
                            <div class="location-item">Pavillon Sportif</div>
                            <div class="location-item">Bureau du registraire</div>
                            <div class="location-item">Accueil</div>
                            <div class="location-item">BarUQAC</div>
                        </div>
                    </div>

                    <div id="search-results" class="hidden">
                        <h3 class="search-section-title">Résultats</h3>
                        <div class="location-list" id="dynamic-results-list"></div>
                    </div>
                </div>
            </div>

            <div id="route-overlay" class="hidden">
                <div class="drag-handle"></div>
                
                <div class="route-header">
                    <h2>Itinéraire</h2>
                    <button id="btn-close-route" class="btn-close-overlay">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <div class="route-content">
                    <div class="route-options toggle-group">
                        <button class="toggle-btn active"><i class="fa-solid fa-person-walking"></i></button>
                        <button class="toggle-btn"><i class="fa-solid fa-wheelchair"></i></button>
                    </div>
                    
                    <div class="route-inputs">
                        <div class="route-input-group">
                            <i class="fa-regular fa-circle text-primary"></i>
                            <input type="text" id="route-start-input" readonly placeholder="Départ">
                        </div>
                        <div class="route-input-group">
                            <i class="fa-solid fa-location-dot text-primary"></i>
                            <input type="text" id="route-end-input" readonly placeholder="Arrivée">
                        </div>
                        <div class="route-input-group add-stop">
                            <i class="fa-solid fa-circle-plus text-primary"></i>
                            <span>Ajouter un arrêt</span>
                        </div>
                    </div>

                    <div class="route-options toggle-group">
                        <button class="toggle-btn"><i class="fa-solid fa-cloud-sun"></i></button>
                        <button class="toggle-btn active"><i class="fa-solid fa-house"></i></button>
                    </div>

                    <button id="btn-lets-go" class="btn-primary">LET'S GO !</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-imageoverlay-rotated@0.1.4/Leaflet.ImageOverlay.Rotated.js"></script>
    
    <script type="module" src="js/main.js"></script>
</body>
</html>
